<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="12" fill="#1c1917"/>
  <!-- Eje tierra: línea vertical -->
  <line x1="60" y1="10" x2="60" y2="110" stroke="#d97706" stroke-width="1.8"/>
  <!-- Eje tierra: línea horizontal -->
  <line x1="10" y1="60" x2="110" y2="60" stroke="#d97706" stroke-width="1.8"/>
  <!-- Cuadrante sup-derecho (plano V) -->
  <rect x="65" y="22" width="32" height="34" rx="3" fill="#78350f" stroke="#f59e0b" stroke-width="0.8"/>
  <!-- Cuadrante inf-izq (plano H) -->
  <rect x="23" y="64" width="32" height="34" rx="3" fill="#14532d" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Punto origen -->
  <circle cx="60" cy="60" r="5" fill="#f59e0b"/>
  <circle cx="60" cy="60" r="8.5" fill="none" stroke="#d97706" stroke-width="0.8"/>
</svg>